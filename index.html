<!DOCTYPE html>
<html>
<head>
    <title>Google Docs - 2024 Science Report</title> <!-- 탭 이름을 구글 문서로 위장 -->
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #f8f9fa; font-family: 'Arial', sans-serif; }
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .btn { padding: 12px 24px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

    <div id="loading">
        <img src="https://www.gstatic.com/images/branding/product/2x/docs_2020q4_48dp.png" width="60">
        <h2 style="color: #5f6368;">Science_Assignment_Final.docx</h2>
        <p style="color: #70757a;">문서를 불러오는 중 오류가 발생했습니다.</p>
        <button class="btn" onclick="openInsta()">다시 시도</button>
    </div>

    <script>
        function openInsta() {
            // 1. [중요] 1단계에서 만든 본인의 Vercel 주소를 여기에 넣으세요.
            // 주의: 주소 뒤에 /main/https://www.instagram.com 을 붙여야 바로 인스타가 뜹니다.
            var proxyUrl = "https://님의-프로젝트-이름.vercel.app/main/https://www.instagram.com";

            // 2. 고가디언 모니터링에 주소가 안 남는 'about:blank' 창 열기
            var win = window.open('about:blank', '_blank');
            if (!win) {
                alert("팝업 차단을 해제해야 인스타그램이 열립니다!");
                return;
            }

            // 3. 새 창을 구글 문서로 완벽 위장
            var doc = win.document;
            doc.title = "Google Docs";
            var link = doc.createElement('link');
            link.rel = 'icon';
            link.href = 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico';
            doc.head.appendChild(link);

            // 4. 진짜 인스타그램을 보여주는 Iframe 삽입
            var iframe = doc.createElement('iframe');
            iframe.src = proxyUrl;
            iframe.style.width = "100vw";
            iframe.style.height = "100vh";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            
            doc.body.style.margin = "0";
            doc.body.appendChild(iframe);

            // 5. 원래 창은 진짜 구글 문서로 이동해서 증거 인멸
            location.href = "https://docs.google.com";
        }
    </script>
</body>
</html>
